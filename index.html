<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Pitch - Glücksräder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
        }

        canvas {
            width: 100%;
            height: 100%;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #f8fafc;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
            z-index: 10;
        }

        .btn-pixel {
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            transition: all 0.3s ease;
        }

        .btn-pixel:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        /* Joker Shake Animation */
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }
        .joker-animation {
            display: inline-block;
            animation: shake 0.5s infinite ease-in-out;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="text-center mb-12">
        <h1 class="text-5xl md:text-7xl font-bold tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-sky-400 to-indigo-400">
            Pixel Pitch
        </h1>
        <p class="text-slate-400 mt-2">Wähle den Pitcher und das Thema</p>
    </header>

    <main class="max-w-6xl mx-auto">
        <div class="flex flex-col items-center mb-8">
            <button onclick="spinBoth()" id="masterSpinBtn" class="px-12 py-6 rounded-2xl btn-pixel text-2xl font-black uppercase tracking-[0.2em] shadow-2xl disabled:opacity-50 disabled:cursor-not-allowed">
                PITCH STARTEN!
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Linke Seite: Namensrad -->
            <div class="glass p-6 flex flex-col items-center">
                <div class="flex justify-between w-full items-center mb-6">
                    <h2 class="text-2xl font-semibold text-sky-400">Pitcher</h2>
                    <span id="namesCount" class="text-xs text-slate-500 bg-white/5 px-2 py-1 rounded">0 Personen</span>
                </div>
                <div class="wheel-container mb-8">
                    <div class="pointer"></div>
                    <canvas id="namesWheel" width="500" height="500"></canvas>
                </div>
                <div class="w-full space-y-4">
                    <div class="flex gap-2">
                        <input type="text" id="nameInput" placeholder="Name hinzufügen..." class="flex-1 bg-white/10 border border-white/20 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 ring-sky-400 text-white">
                        <button onclick="addName()" class="btn-pixel px-4 py-2 rounded-lg font-bold">Add</button>
                    </div>
                    <div id="namesList" class="flex flex-wrap gap-2 text-xs min-h-[40px]">
                        <!-- Namen erscheinen hier -->
                    </div>
                </div>
            </div>

            <!-- Rechte Seite: Themenrad -->
            <div class="glass p-6 flex flex-col items-center">
                <h2 class="text-2xl font-semibold mb-6 text-emerald-400">Thema</h2>
                <div class="wheel-container mb-8">
                    <div class="pointer"></div>
                    <canvas id="topicsWheel" width="500" height="500"></canvas>
                </div>
                <div class="mt-4 p-4 bg-white/5 rounded-xl w-full">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="text-xs font-bold text-slate-500 uppercase">Themen-Pool (manuell entfernbar)</h3>
                    </div>
                    <ul id="topicPool" class="text-[10px] text-slate-400 grid grid-cols-2 gap-2">
                        <!-- Themenliste -->
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <!-- Kombiniertes Winner Modal -->
    <div id="winnerModal" class="fixed inset-0 modal-overlay flex items-center justify-center hidden z-50 p-4">
        <div class="glass p-8 md:p-16 text-center max-w-2xl w-full border-2 border-white/20 animate-pop">
            <div class="text-sky-400 text-sm font-bold uppercase tracking-widest mb-4">Das Ergebnis steht fest!</div>
            
            <div class="space-y-8 my-8">
                <div>
                    <div class="text-slate-400 text-xs uppercase mb-1">Pitcher</div>
                    <div id="winnerName" class="text-4xl md:text-6xl font-black text-white">Name</div>
                </div>
                
                <div class="h-px bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
                
                <div class="flex flex-col items-center">
                    <div class="text-slate-400 text-xs uppercase mb-1">Thema</div>
                    <div class="flex items-center justify-center gap-3">
                        <span id="jokerIconLeft" class="text-4xl md:text-6xl hidden joker-animation">🤡</span>
                        <div id="winnerTopic" class="text-3xl md:text-5xl font-bold text-emerald-400 italic text-center">Thema</div>
                        <span id="jokerIconRight" class="text-4xl md:text-6xl hidden joker-animation">🤡</span>
                    </div>
                    <div id="jokerSubtext" class="text-sm text-amber-400 mt-2 hidden font-bold tracking-widest uppercase">Freie Themenwahl!</div>
                </div>
            </div>

            <!-- Status-Bereich für Google Sheets -->
            <div id="statusContainer" class="mb-6">
                <div id="statusMsg" class="text-xs text-slate-400">Warte auf Ergebnis...</div>
            </div>

            <button onclick="closeModal()" class="btn-pixel px-12 py-4 rounded-xl font-bold text-lg">Verstanden</button>
        </div>
    </div>

    <script>
        // --- KONFIGURATION ---
        // Die von dir bereitgestellte URL ist hier fest eingetragen:
        const scriptURL = "https://script.google.com/macros/s/AKfycbwtMafcYmtIghnjxp2cfyj_39Alk5PRzlvmfZzdTSklP0Duxbjf9lfXuleKfXe_JVM/exec"; 

        let names = [];
        let topics = [
            "Beste Kamera", "Pixel und Gemini", "Design", "Sicherheit", 
            "Familien-Funktionen", "Pixel Drops", "Android auf Pixel", 
            "10 Pro Fold", "Pixel Snap", "Pixel Watch", "Pixel Buds", 
            "Tensor G5", "Pixel Display", "Joker"
        ];
        
        const colors = ['#38bdf8', '#818cf8', '#c084fc', '#fb7185', '#fb923c', '#facc15', '#4ade80', '#2dd4bf'];

        let namesAngle = 0;
        let topicsAngle = 0;
        let isSpinning = false;

        function init() {
            updateNamesList();
            drawWheel('namesWheel', names, "Namen eintragen!");
            drawWheel('topicsWheel', topics);
            renderTopicList();
        }

        function drawWheel(canvasId, items, emptyText = "Leer") {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2 - 10;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (items.length === 0) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                ctx.fillStyle = 'rgba(255,255,255,0.05)';
                ctx.fill();
                ctx.fillStyle = '#64748b';
                ctx.font = 'italic 20px Inter';
                ctx.textAlign = 'center';
                ctx.fillText(emptyText, centerX, centerY);
                return;
            }

            const arcSize = (2 * Math.PI) / items.length;

            items.forEach((item, i) => {
                const angle = i * arcSize;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + arcSize);
                
                if (item === "Joker") {
                    ctx.fillStyle = "#f59e0b";
                } else {
                    ctx.fillStyle = colors[i % colors.length];
                }
                
                ctx.fill();
                ctx.strokeStyle = 'rgba(15, 23, 42, 0.4)';
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + arcSize / 2);
                
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                
                if (item === "Joker") {
                    ctx.font = "bold 16px Inter";
                    ctx.fillText("🤡 Joker", radius - 15, 6);
                } else {
                    ctx.font = "bold 15px Inter";
                    ctx.fillText(item.length > 18 ? item.substring(0, 15) + "..." : item, radius - 25, 6);
                }
                ctx.restore();
            });

            ctx.beginPath();
            ctx.arc(centerX, centerY, 40, 0, 2 * Math.PI);
            ctx.fillStyle = '#0f172a';
            ctx.fill();
        }

        function addName() {
            const input = document.getElementById('nameInput');
            const name = input.value.trim();
            if (name && !isSpinning) {
                names.push(name);
                input.value = '';
                updateNamesList();
                drawWheel('namesWheel', names);
            }
        }

        function removeTopic(index) {
            if (isSpinning) return;
            topics.splice(index, 1);
            drawWheel('topicsWheel', topics);
            renderTopicList();
        }

        function updateNamesList() {
            const container = document.getElementById('namesList');
            const countEl = document.getElementById('namesCount');
            if (countEl) countEl.innerText = `${names.length} Personen`;
            container.innerHTML = names.map(n => `<span class="bg-white/5 border border-white/10 px-2 py-1 rounded text-slate-300">${n}</span>`).join('');
        }

        function renderTopicList() {
            const container = document.getElementById('topicPool');
            container.innerHTML = topics.map((t, idx) => `
                <li class="flex justify-between items-center bg-white/5 p-1 px-2 rounded hover:bg-white/10 group transition-all">
                    <span>${t === "Joker" ? "🤡 Joker" : t}</span>
                    <button onclick="removeTopic(${idx})" class="text-red-400 opacity-0 group-hover:opacity-100 font-bold hover:scale-110">✕</button>
                </li>
            `).join('');
        }

        async function spinBoth() {
            if (isSpinning || names.length === 0 || topics.length === 0) return;
            isSpinning = true;
            
            document.getElementById('masterSpinBtn').disabled = true;
            document.getElementById('jokerSubtext').classList.add('hidden');
            document.getElementById('jokerIconLeft').classList.add('hidden');
            document.getElementById('jokerIconRight').classList.add('hidden');
            document.getElementById('statusMsg').innerText = "Räder drehen...";
            document.getElementById('statusMsg').className = "text-xs text-slate-400";

            const nameCanvas = document.getElementById('namesWheel');
            const topicCanvas = document.getElementById('topicsWheel');

            const nRot = 7 + Math.random() * 5;
            const nExtra = Math.random() * 360;
            const tRot = 7 + Math.random() * 5;
            const tExtra = Math.random() * 360;

            namesAngle += (nRot * 360 + nExtra);
            topicsAngle += (tRot * 360 + tExtra);

            nameCanvas.style.transform = `rotate(${namesAngle}deg)`;
            topicCanvas.style.transform = `rotate(${topicsAngle}deg)`;

            setTimeout(() => {
                const nDeg = (360 - (namesAngle % 360) + 270) % 360;
                const nIdx = Math.floor(nDeg / (360 / names.length)) % names.length;
                const winnerName = names[nIdx];

                const tDeg = (360 - (topicsAngle % 360) + 270) % 360;
                const tIdx = Math.floor(tDeg / (360 / topics.length)) % topics.length;
                const winnerTopic = topics[tIdx];

                if (winnerTopic === "Joker") {
                    document.getElementById('jokerSubtext').classList.remove('hidden');
                    document.getElementById('jokerIconLeft').classList.remove('hidden');
                    document.getElementById('jokerIconRight').classList.remove('hidden');
                }
                
                showCombinedResult(winnerName, winnerTopic);
                saveToGoogleSheets(winnerName, winnerTopic);

                names.splice(nIdx, 1);
                
                setTimeout(() => {
                    drawWheel('namesWheel', names, names.length === 0 ? "Alle gepitcht!" : "");
                    updateNamesList();
                    isSpinning = false;
                    document.getElementById('masterSpinBtn').disabled = false;
                }, 500);
            }, 4100);
        }

        function showCombinedResult(name, topic) {
            document.getElementById('winnerName').innerText = name;
            document.getElementById('winnerTopic').innerText = topic;
            document.getElementById('winnerModal').classList.remove('hidden');
        }

        async function saveToGoogleSheets(name, topic) {
            const status = document.getElementById('statusMsg');
            
            // Detaillierter Check der URL Variable
            if (!scriptURL || scriptURL.trim() === "" || scriptURL.includes("URL_HIER")) {
                status.innerText = "Fehler: Google Script URL nicht korrekt konfiguriert.";
                status.className = "text-xs text-red-400 font-bold";
                return;
            }

            status.innerText = "Speichere in Google Sheets...";
            status.className = "text-xs text-sky-400";
            
            const payload = { 
                name: name, 
                topic: topic, 
                timestamp: new Date().toLocaleString("de-DE") 
            };

            try {
                // Bei Google Apps Script nutzen wir mode: 'no-cors', 
                // da Google keinen CORS-Header sendet, aber die Daten trotzdem ankommen.
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                // Da no-cors keine Antwort lesen kann, gehen wir bei Erfolg des Fetch-Calls 
                // davon aus, dass die Daten gesendet wurden.
                status.innerText = "Erfolgreich in Tabelle gespeichert!";
                status.className = "text-xs text-emerald-400 font-bold";
            } catch (error) {
                console.error("Fetch Fehler:", error);
                status.innerText = "Verbindungsfehler beim Speichern.";
                status.className = "text-xs text-red-400 font-bold";
            }
        }

        function closeModal() {
            document.getElementById('winnerModal').classList.add('hidden');
        }

        document.getElementById('nameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addName();
        });

        window.onload = init;
    </script>
</body>
</html>
