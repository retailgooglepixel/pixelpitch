
<!DOCTYPE html>

<body class="h-full antialiased">
    <div id="root" class="flex flex-col min-h-screen"></div>

    <script type="module">
      // React and ReactDOM are now global, no need for explicit imports here.
      // import React from 'react'; 
      // import ReactDOM from 'react-dom/client';

      const CE = React.createElement;

      // --- Inlined GoogleColorLogoIcon.tsx (converted to JS) ---
      const GoogleColorLogoIcon = ({ className }) => {
        return CE("svg", { className: className || "w-8 h-8", fill: "currentColor", viewBox: "0 0 24 24" },
          CE("path", { d: "M22.56,12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26,1.37-1.04,2.53-2.21,3.31v2.77h3.57c2.08-1.92,3.28-4.74,3.28-8.09Z", fill: "#4285f4" }),
          CE("path", { d: "M12,23c2.97,0,5.46-.98,7.28-2.66l-3.57-2.77c-.98,.66-2.23,1.06-3.71,1.06-2.86,0-5.29-1.93-6.16-4.53H2.18v2.84C3.99,20.53,7.7,23,12,23Z", fill: "#34a853" }),
          CE("path", { d: "M5.84,14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43,.35-2.09V7.07H2.18C1.43,8.55,1,10.22,1,12s.43,3.45,1.18,4.93l3.66-2.84Z", fill: "#fbbc05" }),
          CE("path", { d: "M12,5.38c1.62,0,3.06,.56,4.21,1.64l3.15-3.15C17.45,2.09,14.97,1,12,1,7.7,1,3.99,3.47,2.18,7.07l3.66,2.84c.87-2.6,3.3-4.53,6.16-4.53Z", fill: "#ea4335" })
        );
      };

      // --- Inlined App.tsx (converted to JS with React.createElement) ---
      const App = () => {
        const { useState, useEffect, useRef, useCallback } = React;

        const [revealedElements, setRevealedElements] = useState(new Set());
        const [timelineAnimatedOnce, setTimelineAnimatedOnce] = useState(false);
        
        const elementsToRevealRef = useRef(new Map());

        const addToRefs = useCallback((id, el) => {
          if (el) {
            elementsToRevealRef.current.set(id, el);
          } else {
            elementsToRevealRef.current.delete(id);
          }
        }, []);
        
        useEffect(() => {
          if (typeof window.Chart === 'undefined' || typeof window.ChartDataLabels === 'undefined') {
              console.warn('Chart.js or ChartDataLabels not loaded');
              return;
          }
          window.Chart.register(window.ChartDataLabels);
          window.Chart.defaults.font.family = 'Google Sans';
          window.Chart.defaults.font.size = 14;
          if (window.Chart.defaults.plugins?.title?.font) {
               window.Chart.defaults.plugins.title.font.family = 'Google Sans';
          }

          const currentElements = Array.from(elementsToRevealRef.current.values());
          const observer = new IntersectionObserver(
            (entries) => {
              entries.forEach((entry) => {
                const targetElement = entry.target; 
                const id = targetElement.dataset.revealId;
                if (entry.isIntersecting && id) {
                  setRevealedElements((prev) => new Set(prev).add(id));
                  
                  if (targetElement.dataset.isTimeline === 'true' && !timelineAnimatedOnce) {
                      setTimelineAnimatedOnce(true);
                  }
                  observer.unobserve(entry.target);
                }
              });
            },
            { threshold: 0.1 } 
          );

          currentElements.forEach((el) => {
            if (el) observer.observe(el);
          });

          return () => {
            currentElements.forEach((el) => {
              if (el) observer.unobserve(el);
            });
          };
        }, [timelineAnimatedOnce, addToRefs]); 

        useEffect(() => {
          if (timelineAnimatedOnce) {
            const timelineItems = Array.from(elementsToRevealRef.current.values()).filter(
              el => el?.dataset.isTimeline === 'true'
            );
            timelineItems.forEach((el, index) => {
              if (el?.dataset.revealId) {
                  const id = el.dataset.revealId;
                  setTimeout(() => {
                      setRevealedElements(prev => new Set(prev).add(id));
                  }, index * 200); 
              }
            });
          }
        }, [timelineAnimatedOnce]);

        const pixelGrowthChartRef = useRef(null);
        useEffect(() => {
          if (pixelGrowthChartRef.current && typeof window.Chart !== 'undefined') {
            const ctx = pixelGrowthChartRef.current.getContext('2d');
            if (!ctx) return;
            const gradient = ctx.createLinearGradient(0, 0, 0, ctx.canvas.height); 
            gradient.addColorStop(0, 'rgba(226, 0, 116, 0.7)');
            gradient.addColorStop(1, 'rgba(226, 0, 116, 0)');

            const chartInstance = new window.Chart(ctx, {
              type: 'line',
              data: {
                labels: ['2021', '2022', '2023', '2024'],
                datasets: [{
                  label: 'Unit Share %',
                  data: [0.2, 0.9, 2.0, 3.6],
                  backgroundColor: gradient,
                  borderColor: '#E20074',
                  borderWidth: 3,
                  pointBackgroundColor: '#E20074',
                  pointBorderColor: '#fff',
                  pointHoverBackgroundColor: '#fff',
                  pointHoverBorderColor: '#E20074',
                  pointRadius: 6,
                  pointHoverRadius: 8,
                  fill: true,
                  tension: 0.4
                }]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                  legend: { display: false },
                  title: {
                    display: true,
                    text: ["Google Pixel Market Share 🇦🇹", "(GFK >350€)"],
                    font: { size: 16, weight: '500' }, 
                    padding: { top: 10, bottom: 20 },
                    color: '#333'
                  },
                  datalabels: {
                    anchor: 'end',
                    align: 'top',
                    formatter: (value) => value + '%',
                    font: { weight: 'bold', size: 14, family: 'Google Sans' }, 
                    color: '#4A4A4A'
                  }
                },
                scales: {
                  y: { grid: { display: false }, ticks: { display: false } },
                  x: { grid: { display: false }, ticks: { font: { size: 12, family: 'Google Sans' }, color: '#333' } } 
                }
              }
            });
            return () => chartInstance.destroy();
          }
        }, []);

        const [selectedLeaderboardRank, setSelectedLeaderboardRank] = useState(null);
        const leaderboardData = [
            { rank: 1, brand: 'Apple', units: 674900, logo: CE("img", { src: "https://logo.clearbit.com/apple.com?size=32", alt: "Apple", className: "w-8 h-8 rounded" }) },
            { rank: 2, brand: 'Samsung', units: 486000, logo: CE("img", { src: "https://logo.clearbit.com/samsung.com?size=32", alt: "Samsung", className: "w-8 h-8 rounded" }) },
            { rank: 3, brand: 'Google', units: 45300, logo: CE(GoogleColorLogoIcon, { className: "w-8 h-8" }), isGoogle: true },
            { rank: 4, brand: 'Xiaomi Group', units: 20326, logo: CE("img", { src: "https://logo.clearbit.com/mi.com?size=32", alt: "Xiaomi", className: "w-8 h-8 rounded" }) },
            { rank: 5, brand: 'Vivo', units: 19500, logo: CE("img", { src: "https://logo.clearbit.com/vivo.com?size=32", alt: "Vivo", className: "w-8 h-8 rounded" }) }
        ];

        const getMedal = (rank, isGoogle) => {
          const size = rank <= 3 ? 'text-3xl md:text-4xl' : 'text-lg md:text-xl';
          if (rank === 1) return CE("span", { className: size }, "🥇");
          if (rank === 2) return CE("span", { className: size }, "🥈");
          if (rank === 3) {
              return CE("div", { className: "flex items-center justify-center" },
                  isGoogle && CE("span", { className: "text-green-500 text-xl md:text-2xl mr-1" }, "▲"),
                  CE("span", { className: size }, "🥉")
              );
          }
          return CE("span", { className: "font-bold text-gray-500 text-base md:text-lg" }, rank);
        };

        const competitorGrowthChartRef = useRef(null);
        useEffect(() => {
          if (competitorGrowthChartRef.current && typeof window.Chart !== 'undefined') {
            const getVisibleDataBounds = (chart) => {
              const visibleData = chart.data.datasets
                  .filter((_, i) => !chart.getDatasetMeta(i).hidden)
                  .flatMap((d) => d.data.filter((val) => typeof val === 'number')); 

              if (visibleData.length === 0) return { max: 100, min: -25 }; 
              
              let maxValue = Math.max(...visibleData, 0); 
              let minValue = Math.min(...visibleData, 0);
              
              if (maxValue === minValue) {
                  maxValue = maxValue + 10; 
                  minValue = minValue - 10; 
              }
              if (maxValue === 0 && minValue === 0 && visibleData.length > 0) { 
                return { max: 10, min: -10};
              }

              const paddingFactor = 1.2; 
              
              let yMax = maxValue >= 0 ? maxValue * paddingFactor : maxValue / paddingFactor;
              let yMin = minValue <= 0 ? minValue * paddingFactor : minValue / paddingFactor;

              if (maxValue >= 0 && yMax < maxValue + 5) yMax = maxValue + 5;
              if (maxValue < 0 && yMax > maxValue -5) yMax = maxValue -5;

              if (minValue <= 0 && yMin > minValue - 5) yMin = minValue - 5;
              if (minValue > 0 && yMin < minValue + 5) yMin = minValue + 5;
              
              if (yMax === 0 && maxValue === 0 && visibleData.some((v) => v === 0)) yMax = 10;
              if (yMin === 0 && minValue === 0 && visibleData.some((v) => v === 0)) yMin = -10;

              return { 
                  max: Math.ceil(yMax / 5) * 5 , 
                  min: Math.floor(yMin / 5) * 5 
              };
            };
            
            const chartInstance = new window.Chart(competitorGrowthChartRef.current, {
              type: 'bar',
              data: {
                  labels: ['Google Pixel', 'Apple', 'Samsung', 'Total Market'],
                  datasets: [
                  {
                      label: "YoY Growth '22",
                      data: [357.1, 2.8, 25.8, 11.4],
                      backgroundColor: 'rgba(226, 0, 116, 0.2)',
                      borderColor: 'rgba(226, 0, 116, 0.4)',
                      borderWidth: 1,
                      hidden: true
                  },
                  {
                      label: "YoY Growth '23",
                      data: [145.9, 6.8, 19.0, 11.5],
                      backgroundColor: 'rgba(226, 0, 116, 0.5)',
                      borderColor: 'rgba(226, 0, 116, 0.7)',
                      borderWidth: 1,
                      hidden: true 
                  },
                  {
                      label: "YoY Growth '24",
                      data: [62.5, -3.7, -21.5, -10.3],
                      backgroundColor: 'rgba(226, 0, 116, 0.9)',
                      borderColor: 'rgba(226, 0, 116, 1)',
                      borderWidth: 1
                  }]
              },
              options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  plugins: {
                      legend: {
                          position: 'top',
                          labels: { color: '#333', font: {size: 12} },
                          onClick: (e, legendItem, legend) => {
                              window.Chart.defaults.plugins.legend.onClick.call(legend, e, legendItem, legend);
                              const { max, min } = getVisibleDataBounds(legend.chart);
                              if (legend.chart.options.scales?.y) {
                                  legend.chart.options.scales.y.max = max;
                                  legend.chart.options.scales.y.min = min;
                              }
                              legend.chart.update();
                          }
                      },
                      title: {
                          display: true,
                          text: ['Yearly Growth Rate Smartphones 🇦🇹', '(GFK >350€)'],
                          font: { size: 16, weight: '500', family: 'Google Sans' },
                          padding: { top: 10, bottom: 20 },
                          color: '#333'
                      },
                      datalabels: {
                          anchor: 'end',
                          align: 'top', 
                          offset: 6,    
                          formatter: (value) => value.toFixed(1) + '%',
                          font: { weight: 'bold', size: 14, family: 'Google Sans' },
                          color: (context) => context.dataset.data[context.dataIndex] >= 0 ? 'green' : 'red'
                      },
                      tooltip: {
                          callbacks: {
                             label: function(context) {
                                  const label = context.dataset.label || '';
                                  const growth = context.parsed.y;
                                  const absoluteUnits = {
                                      '22': [11300, 656200, 520200, 1300000],
                                      '23': [27900, 700700, 619300, 1400000],
                                      '24': [45300, 674900, 486000, 1300000]
                                  };
                                  let yearKey;
                                  if (label.includes("'22")) yearKey = '22';
                                  else if (label.includes("'23")) yearKey = '23';
                                  else yearKey = '24';
                                  
                                  const units = absoluteUnits[yearKey][context.dataIndex];
                                  const formattedUnits = (units / 1000).toFixed(1) + 'k';

                                  return `${label}: ${growth.toFixed(1)}% (${formattedUnits} units)`;
                             }
                          }
                      }
                  },
                  scales: {
                      y: { 
                          grid: { 
                              color: function(context) {
                                  if (context.tick && context.tick.value === 0) {
                                      return 'rgba(0, 0, 0, 0.15)'; 
                                  }
                                  return 'transparent'; 
                              },
                              drawBorder: false,
                          },
                          ticks: { 
                              display: false, 
                          },
                      },
                      x: { 
                          grid: { display: false }, 
                          ticks: { font: { family: 'Google Sans', size: 12 }, color: '#333' }
                      }
                  }
              }
            });
            
            if(chartInstance.options.scales?.y) {
              chartInstance.options.scales.y.max = 100;
              chartInstance.options.scales.y.min = -25; 
            }
            chartInstance.update();
            
            return () => chartInstance.destroy();
          }
        }, []);

        const potentialChartRef = useRef(null);
        useEffect(() => {
          if (potentialChartRef.current && typeof window.Chart !== 'undefined') {
            const chartInstance = new window.Chart(potentialChartRef.current, {
              type: 'doughnut',
              data: {
                  labels: ['Covered Market', 'Untapped Potential (Magenta)'],
                  datasets: [{
                      data: [60, 40],
                      backgroundColor: ['rgba(0,0,0,0.1)', '#E20074'],
                      borderColor: ['#ffffff'],
                      borderWidth: 4,
                  }]
              },
              options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  cutout: '70%',
                  plugins: {
                      legend: { display: false },
                      tooltip: { enabled: false },
                      datalabels: { display: false }
                  }
              }
            });
            
            let pulseStep = 0;
            const intervalId = setInterval(() => {
                pulseStep += 0.05;
                const value = 40 + Math.sin(pulseStep) * 5; 
                if(chartInstance.data.datasets[0]){
                  chartInstance.data.datasets[0].data[1] = value;
                  chartInstance.data.datasets[0].data[0] = 100 - value;
                }
                chartInstance.update('none');
            }, 70); 

            return () => {
              clearInterval(intervalId);
              chartInstance.destroy();
            }
          }
        }, []);

        const [agreementType, setAgreementType] = useState('strategic');

        const handleStrategicAgreementClick = () => {
          setAgreementType('strategic');
          if (typeof window.confetti !== 'undefined') {
              const duration = 1.5 * 1000; 
              const animationEnd = Date.now() + duration;
              const defaults = { startVelocity: 25, spread: 360, ticks: 50, zIndex: 1000 };

              function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
              }

              const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                
                const particleCount = 40 * (timeLeft / duration);
                window.confetti({...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
                window.confetti({...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
              }, 200); 
          }
        };

        const getRevealClasses = (id, isTimelineItem = false, isRight) => {
          const baseTransition = `transition-all duration-700 ease-out`;
          let initialTransform = 'opacity-0 translate-y-8'; 
          if (isTimelineItem) {
              initialTransform = isRight ? 'opacity-0 translate-x-12' : 'opacity-0 -translate-x-12';
          }
          
          const isVisible = revealedElements.has(id);
          return `${baseTransition} ${isVisible ? 'opacity-100 translate-y-0 translate-x-0' : initialTransform}`;
        };
        
        const timelineItemIds = ['timeline-2022', 'timeline-2023', 'timeline-2024'];

        const commitmentItems = [
          { id: 'commit-1', Icon: (props) => CE("svg", {...props, xmlns:"http://www.w3.org/2000/svg", fill:"none", viewBox:"0 0 24 24", strokeWidth:"1.5", stroke:"currentColor"}, CE("path", {strokeLinecap:"round", strokeLinejoin:"round", d:"M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z" })), title: "Co-Marketing Campaigns", desc: "Quarterly joint initiatives (ATL/BTL) to position Pixel as a hero portfolio within Magenta & matching investments." },
          { id: 'commit-2', Icon: (props) => CE("svg", {...props, xmlns:"http://www.w3.org/2000/svg", fill:"none", viewBox:"0 0 24 24", strokeWidth:"1.5", stroke:"currentColor"}, CE("path", {strokeLinecap:"round", strokeLinejoin:"round", d:"M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h7.5" })), title: "Enhanced POS Visibility", desc: "Strategic placement and engaging displays for Pixel in key Magenta stores on par with competitors with co-funding of NCUs." },
          { id: 'commit-3', Icon: (props) => CE("svg", {...props, xmlns:"http://www.w3.org/2000/svg", fill:"none", viewBox:"0 0 24 24", strokeWidth:"1.5", stroke:"currentColor"}, CE("path", {strokeLinecap:"round", strokeLinejoin:"round", d:"M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25A2.25 2.25 0 015.25 3h13.5A2.25 2.25 0 0121 5.25z" })), title: "Digital Marketing", desc: "Joint performance marketing to boost traffic to stores and online, with dedicated landing pages." },
          { id: 'commit-4', Icon: (props) => CE("svg", {...props, xmlns:"http://www.w3.org/2000/svg", fill:"none", viewBox:"0 0 24 24", strokeWidth:"1.5", stroke:"currentColor"}, CE("path", {strokeLinecap:"round", strokeLinejoin:"round", d:"M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z" })), title: "Salesforce Empowerment", desc: "Ongoing access for training & merchandising, plus performance incentives for shop & call center staff." },
          { id: 'commit-5', Icon: (props) => CE("svg", {...props, xmlns:"http://www.w3.org/2000/svg", fill:"none", viewBox:"0 0 24 24", strokeWidth:"1.5", stroke:"currentColor"}, CE("path", {strokeLinecap:"round", strokeLinejoin:"round", d:"M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" })), title: "Targeted CRM", desc: "Continuous execution of targeted CRM campaigns to Magenta's customer base to drive upgrades and acquisition." },
          { id: 'commit-6', Icon: (props) => CE("svg", {...props, xmlns:"http://www.w3.org/2000/svg", fill:"none", viewBox:"0 0 24 24", strokeWidth:"1.5", stroke:"currentColor"}, CE("path", {strokeLinecap:"round", strokeLinejoin:"round", d:"M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" })), title: "Employee Enthusiasm", desc: "Drive internal adoption and passion via Employee Purchase Programs and sponsoring sales events." }
        ];
        const [selectedCommitmentCards, setSelectedCommitmentCards] = useState(new Set());

        const toggleCommitmentCard = (cardId) => {
          setSelectedCommitmentCards(prev => {
            const newSet = new Set(prev);
            if (newSet.has(cardId)) {
              newSet.delete(cardId);
            } else {
              newSet.add(cardId);
            }
            return newSet;
          });
        };

        const getProgressBarColor = (selectedCount, totalCount) => {
          if (totalCount === 0 || selectedCount === 0) return 'bg-transparent'; 
          const percentage = (selectedCount / totalCount) * 100;
          if (percentage === 100) return 'bg-green-500';
          if (percentage < 50) return 'bg-red-500';
          return 'bg-orange-500';
        };

        return CE("div", { className: "flex flex-col min-h-screen" }, 
          CE("header", { className: "bg-[#E20074] text-white shadow-lg relative overflow-hidden w-full" },
            CE("img", { 
                src: "https://www.dropbox.com/scl/fi/ohsyhtn363jin2r8hldwz/telekom-logo.png?rlkey=76rq07zbrkm3n57t35g4cct4c&st=5ie8ifb7&dl=1",
                alt: "Telekom Logo",
                ref: el => addToRefs('logo-telekom', el),
                "data-reveal-id": "logo-telekom",
                className: `absolute left-4 md:left-8 top-1/2 -translate-y-1/2 h-10 md:h-14 lg:h-16 xl:h-20 w-auto ${getRevealClasses('logo-telekom')}`
            }),
            CE("img", { 
                src: "https://www.dropbox.com/scl/fi/8s5x1sr7shje8gqt6y2w6/google-logo.png?rlkey=t1k0dvnjre2hbher9kw2h2hdi&st=0vc3rhsw&dl=1",
                alt: "Google Logo",
                ref: el => addToRefs('logo-google', el),
                "data-reveal-id": "logo-google",
                className: `absolute right-4 md:right-8 top-1/2 -translate-y-1/2 h-10 md:h-14 lg:h-16 xl:h-20 w-auto ${getRevealClasses('logo-google')}`
            }),
            CE("div", { className: "container mx-auto px-4 sm:px-6 lg:px-8 xl:px-10 py-5 md:py-6 lg:py-8 xl:py-10 text-center relative z-10 min-h-[15vh] flex flex-col items-center justify-center" },
                CE("h1", {
